<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0f;
        --surface: #111118;
        --surface-2: #16161f;
        --border: #1e1e2e;
        --border-hi: #2e2e42;
        --accent: #c8f135;
        --accent-dim: #8aaa20;
        --accent-glow: rgba(200, 241, 53, 0.18);
        --muted: #3a3a52;
        --text: #e8e8f0;
        --text-dim: #6b6b8a;
        --danger: #ff5c5c;
        --danger-glow: rgba(255, 92, 92, 0.12);
        --success: #4ade80;
        --success-glow: rgba(74, 222, 128, 0.12);
        --radius: 6px;
      }

      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--muted);
        border-radius: 3px;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Space Mono", monospace;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        -webkit-font-smoothing: antialiased;
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.3;
        pointer-events: none;
      }

      .orb {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        filter: blur(80px);
      }
      .orb-1 {
        width: 500px;
        height: 500px;
        top: -180px;
        left: -100px;
        background: radial-gradient(
          circle,
          rgba(200, 241, 53, 0.07),
          transparent 65%
        );
      }
      .orb-2 {
        width: 400px;
        height: 400px;
        bottom: -120px;
        right: -80px;
        background: radial-gradient(
          circle,
          rgba(200, 241, 53, 0.05),
          transparent 65%
        );
      }

      /* ── Card ── */
      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 420px;
        background: var(--surface);
        border: 1px solid var(--border-hi);
        border-radius: 12px;
        padding: 2.25rem 2rem;
        box-shadow:
          0 0 0 1px rgba(200, 241, 53, 0.04),
          0 40px 80px rgba(0, 0, 0, 0.6);
        animation: cardIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 24px;
        right: 24px;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        border-radius: 0 0 2px 2px;
        opacity: 0.7;
      }

      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(24px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* ── Header ── */
      .header {
        margin-bottom: 1.5rem;
        padding-bottom: 1.25rem;
        border-bottom: 1px solid var(--border);
        animation: fadeDown 0.5s 0.1s ease both;
      }

      h1 {
        font-family: "Space Mono", monospace;
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: 0.01em;
        line-height: 1.3;
        color: var(--text);
      }

      .subtitle {
        margin-top: 5px;
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 0.03em;
        line-height: 1.6;
      }

      /* ── Form ── */
      .form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        animation: fadeUp 0.5s 0.18s ease both;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }

      .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      .input-wrap {
        position: relative;
      }

      .input-icon {
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        pointer-events: none;
        transition: color 0.15s;
      }

      .input-wrap:focus-within .input-icon {
        color: var(--accent-dim);
      }

      input {
        width: 100%;
        height: 42px;
        padding: 0 0.75rem 0 2.4rem;
        font-family: "Space Mono", monospace;
        font-size: 12px;
        color: var(--text);
        background: var(--surface-2);
        border: 1px solid var(--border-hi);
        border-radius: var(--radius);
        outline: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        letter-spacing: 0.03em;
      }

      /* fields without icon */
      input.no-icon {
        padding-left: 0.75rem;
      }

      input::placeholder {
        color: var(--muted);
        font-size: 11px;
      }

      input:focus {
        border-color: var(--accent-dim);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      input[aria-invalid="true"] {
        border-color: var(--danger);
        box-shadow: 0 0 0 3px var(--danger-glow);
      }

      /* ── Hints ── */
      .hint {
        font-size: 10px;
        letter-spacing: 0.04em;
        color: var(--text-dim);
        line-height: 1.5;
      }

      .hint.error {
        color: var(--danger);
      }
      .hint.ok {
        color: var(--success);
      }

      /* ── Messages ── */
      .error-msg {
        display: none;
        font-size: 11px;
        letter-spacing: 0.03em;
        color: var(--danger);
        background: var(--danger-glow);
        border: 1px solid rgba(255, 92, 92, 0.25);
        border-radius: var(--radius);
        padding: 10px 12px;
        line-height: 1.5;
      }

      .success-msg {
        display: none;
        font-size: 11px;
        letter-spacing: 0.03em;
        color: var(--success);
        background: var(--success-glow);
        border: 1px solid rgba(74, 222, 128, 0.25);
        border-radius: var(--radius);
        padding: 10px 12px;
        line-height: 1.5;
      }

      /* ── Submit ── */
      button[type="submit"] {
        width: 100%;
        height: 42px;
        font-family: "Space Mono", monospace;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--bg);
        background: var(--accent);
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        margin-top: 0.25rem;
        transition:
          background 0.15s,
          box-shadow 0.15s,
          transform 0.1s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        position: relative;
        overflow: hidden;
      }

      button[type="submit"]::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.12) 0%,
          transparent 60%
        );
        pointer-events: none;
      }

      button[type="submit"]:hover {
        background: #d4f547;
        box-shadow: 0 0 20px rgba(200, 241, 53, 0.35);
        transform: translateY(-1px);
      }

      button[type="submit"]:active {
        transform: translateY(0);
      }

      button[type="submit"]:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .spinner {
        display: none;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(10, 10, 15, 0.3);
        border-top-color: var(--bg);
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Terms ── */
      .terms {
        font-size: 10px;
        letter-spacing: 0.03em;
        color: var(--text-dim);
        text-align: center;
        line-height: 1.7;
      }

      .terms a {
        color: var(--accent-dim);
        text-decoration: none;
        transition: color 0.15s;
      }
      .terms a:hover {
        color: var(--accent);
      }

      /* ── Footer ── */
      .footer {
        text-align: center;
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 1.5rem;
        letter-spacing: 0.04em;
        animation: fadeUp 0.5s 0.25s ease both;
      }

      .footer a {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
        transition: opacity 0.15s;
      }
      .footer a:hover {
        opacity: 0.8;
      }

      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card">
      <div class="header">
        <h1>Create an account</h1>
        <p class="subtitle">Enter your details to get started</p>
      </div>

      <form
        class="form"
        id="signupForm"
        novalidate
        action="http://localhost:8080/oauth/register"
        method="POST"
      >
        <div id="errorMsg" class="error-msg" role="alert"></div>
        <div id="successMsg" class="success-msg" role="status"></div>

        <!-- Name row -->
        <div class="field-row">
          <div class="field">
            <label for="firstName">First name</label>
            <div class="input-wrap">
              <svg
                class="input-icon"
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z" />
                <path d="M20 21a8 8 0 1 0-16 0" />
              </svg>
              <input
                id="firstName"
                name="firstName"
                type="text"
                autocomplete="given-name"
                placeholder="John"
                required
              />
            </div>
          </div>
          <div class="field">
            <label for="lastName">Last name</label>
            <div class="input-wrap">
              <svg
                class="input-icon"
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z" />
                <path d="M20 21a8 8 0 1 0-16 0" />
              </svg>
              <input
                id="lastName"
                name="lastName"
                type="text"
                autocomplete="family-name"
                placeholder="Doe"
                required
              />
            </div>
          </div>
        </div>

        <!-- Email -->
        <div class="field">
          <label for="email">Email</label>
          <div class="input-wrap">
            <svg
              class="input-icon"
              width="13"
              height="13"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
            </svg>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="you@example.com"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg
              class="input-icon"
              width="13"
              height="13"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
              placeholder="••••••••"
              required
            />
          </div>
          <span class="hint" id="passwordHint"
            >Must be at least 8 characters</span
          >
        </div>

        <!-- Confirm password -->
        <div class="field">
          <label for="confirmPassword">Confirm password</label>
          <div class="input-wrap">
            <svg
              class="input-icon"
              width="13"
              height="13"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input
              id="confirmPassword"
              name="confirmPassword"
              type="password"
              autocomplete="new-password"
              placeholder="••••••••"
              required
            />
          </div>
          <span class="hint error" id="confirmHint" style="display: none"
            >Passwords do not match</span
          >
        </div>

        <button type="submit" id="submitBtn">
          <span class="spinner" id="spinner"></span>
          <span id="btnText">Create account</span>
        </button>

        <p class="terms">
          By creating an account you agree to our
          <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </p>
      </form>

      <div class="footer">
        Already have an account? <a href="/oauth/authenticate">Sign in</a>
      </div>
    </div>
  </body>
</html>
